<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StatSearch</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #fafaf9;
      --surface: #ffffff;
      --text: #1c1917;
      --text-secondary: #78716c;
      --border: #e7e5e4;
      --accent: #6366f1;
      --accent-light: #eef2ff;
      --accent-hover: #4f46e5;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 2rem 2rem 0;
      text-align: center;
    }

    header h1 {
      font-weight: 300;
      font-size: 1.75rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    header h1 span {
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-top: 0.35rem;
      font-weight: 300;
    }

    .sources {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .sources span {
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 99px;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-weight: 400;
    }

    main {
      flex: 1;
      max-width: 48rem;
      width: 100%;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 0;
      display: flex;
      flex-direction: column;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 1rem;
    }

    .message {
      margin-bottom: 1.5rem;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      text-align: right;
    }

    .message.user .bubble {
      background: var(--accent);
      color: white;
      display: inline-block;
      padding: 0.6rem 1rem;
      border-radius: 1rem 1rem 0.25rem 1rem;
      max-width: 80%;
      text-align: left;
      font-size: 0.9rem;
    }

    .message.assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1rem 1.25rem;
      border-radius: 0.25rem 1rem 1rem 1rem;
      font-size: 0.875rem;
      line-height: 1.65;
    }

    .message.assistant .bubble table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.75rem 0;
      font-size: 0.8rem;
    }

    .message.assistant .bubble th,
    .message.assistant .bubble td {
      padding: 0.4rem 0.6rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .message.assistant .bubble th {
      font-weight: 500;
      color: var(--text-secondary);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .message.assistant .bubble td {
      font-variant-numeric: tabular-nums;
    }

    .message.assistant .bubble tr:last-child td {
      border-bottom: none;
    }

    .message.assistant .bubble code {
      background: var(--bg);
      padding: 0.1em 0.35em;
      border-radius: 4px;
      font-size: 0.8em;
    }

    .message.assistant .bubble strong {
      font-weight: 600;
    }

    .message.assistant .bubble p {
      margin-bottom: 0.5rem;
    }

    .message.assistant .bubble p:last-child {
      margin-bottom: 0;
    }

    .message.assistant .bubble ul, .message.assistant .bubble ol {
      padding-left: 1.25rem;
      margin-bottom: 0.5rem;
    }

    .message.assistant .bubble h3 {
      font-size: 0.95rem;
      font-weight: 600;
      margin: 0.75rem 0 0.35rem;
    }

    .thinking {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.8rem;
      padding: 0.5rem 0;
      animation: fadeIn 0.3s ease;
    }

    .thinking .dots span {
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      margin: 0 1.5px;
      animation: dot 1.4s infinite ease-in-out;
    }

    .thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .input-area {
      position: sticky;
      bottom: 0;
      background: var(--bg);
      padding: 1rem 0 1.5rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 0.35rem;
      transition: border-color 0.2s;
    }

    .input-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.08);
    }

    .input-row input {
      flex: 1;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 0.9rem;
      padding: 0.5rem 0.75rem;
      background: transparent;
      color: var(--text);
    }

    .input-row input::placeholder {
      color: var(--text-secondary);
      font-weight: 300;
    }

    .input-row button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 0.5rem;
      padding: 0.5rem 1.25rem;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: var(--accent-hover);
    }

    .input-row button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
      padding: 2rem 0 0.5rem;
    }

    .suggestions button {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 0.4rem 0.9rem;
      font-family: inherit;
      font-size: 0.78rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestions button:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    footer {
      text-align: center;
      padding: 0.75rem;
      font-size: 0.7rem;
      color: var(--text-secondary);
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <header>
    <h1><span>StatSearch</span></h1>
    <p>Ask questions about Nordic statistics in plain language</p>
    <div class="sources">
      <span>SSB Norway</span>
      <span>SCB Sweden</span>
      <span>Statistics Finland</span>
    </div>
  </header>

  <main>
    <div id="chat">
      <div class="suggestions" id="suggestions">
        <button onclick="ask(this.textContent)">Population of Norway by year</button>
        <button onclick="ask(this.textContent)">Unemployment rate in Sweden</button>
        <button onclick="ask(this.textContent)">Finland GDP growth</button>
        <button onclick="ask(this.textContent)">Birth rate trends in Norway</button>
        <button onclick="ask(this.textContent)">Immigration statistics Sweden</button>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" id="input" placeholder="What statistics are you looking for?"
               onkeydown="if(event.key==='Enter')send()" autofocus>
        <button id="sendBtn" onclick="send()">Search</button>
      </div>
    </div>
  </main>

  <footer>
    Powered by <a href="https://github.com/PxTools/PxWeb2">PxWeb2</a> APIs &middot; Claude AI
  </footer>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const suggestions = document.getElementById('suggestions');

    let conversationHistory = [];

    function ask(text) {
      input.value = text;
      send();
    }

    function addMessage(role, html) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.innerHTML = `<div class="bubble">${html}</div>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function showThinking() {
      const div = document.createElement('div');
      div.className = 'thinking';
      div.id = 'thinking';
      div.innerHTML = `<div class="dots"><span></span><span></span><span></span></div> Searching statistics...`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function hideThinking() {
      const el = document.getElementById('thinking');
      if (el) el.remove();
    }

    // Simple markdown-to-HTML
    function md(text) {
      if (!text) return '';
      // Tables
      text = text.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)*)/gm, (_, header, sep, body) => {
        const ths = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
        const rows = body.trim().split('\n').map(row => {
          const tds = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
          return `<tr>${tds}</tr>`;
        }).join('');
        return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
      });
      // Headers
      text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      text = text.replace(/^## (.+)$/gm, '<h3>$1</h3>');
      // Bold
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // Italic
      text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
      // Code
      text = text.replace(/`(.+?)`/g, '<code>$1</code>');
      // Lists
      text = text.replace(/^- (.+)$/gm, '<li>$1</li>');
      text = text.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
      // Paragraphs
      text = text.replace(/\n\n/g, '</p><p>');
      text = '<p>' + text + '</p>';
      text = text.replace(/<p><(h3|table|ul)/g, '<$1');
      text = text.replace(/<\/(h3|table|ul)><\/p>/g, '</$1>');
      return text;
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;

      if (suggestions) suggestions.remove();
      addMessage('user', text);
      input.value = '';
      sendBtn.disabled = true;

      conversationHistory.push({ role: 'user', content: text });

      showThinking();

      try {
        const resp = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversationHistory }),
        });

        hideThinking();

        if (!resp.ok) {
          const err = await resp.json();
          addMessage('assistant', `<p>Sorry, something went wrong: ${err.error || 'Unknown error'}</p>`);
          return;
        }

        const data = await resp.json();
        const html = md(data.response);
        addMessage('assistant', html);
        conversationHistory.push({ role: 'assistant', content: data.response });
      } catch (err) {
        hideThinking();
        addMessage('assistant', `<p>Connection error. Please try again.</p>`);
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }
  </script>
</body>
</html>
